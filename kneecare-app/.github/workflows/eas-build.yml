name: EAS Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

defaults:
  run:
    working-directory: kneecare-app

jobs:
  build:
    name: Build with EAS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kneecare-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: eas build --non-interactive --no-wait --profile ${{ github.event.inputs.profile }} --platform ${{ github.event.inputs.platform }}

      - name: Build (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: eas build --non-interactive --no-wait --profile production --platform all
