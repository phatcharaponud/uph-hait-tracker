<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAIT Tracker - รพ.มหาวิทยาลัยพะเยา</title>
    <meta name="description" content="ระบบติดตามความคืบหน้าการจัดเตรียมเอกสาร HAIT (Hospital Accreditation for IT) โรงพยาบาลมหาวิทยาลัยพะเยา" />
    <meta name="theme-color" content="#1e3a5f" />
    <link rel="icon" type="image/svg+xml" href="/uph-hait-tracker/favicon.svg" />
    <script>
      // SPA redirect: GitHub Pages serves 404.html for unknown routes
      // Redirect to index.html with the path as a query parameter
      var pathSegmentsToKeep = 1; // '/uph-hait-tracker'
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/' +
        '?/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
